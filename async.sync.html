<!DOCTYPE html>
<html>
<head>
  <title>Async Example</title>
</head>
<body>

  <h3>Open Console to See Output</h3>

<script>
  // Synchronous execution
  console.log("Step 1");
  console.log("Step 2");

  // Asynchronous execution after 2 seconds
  setTimeout(() => {
    console.log("Message displayed after 2 seconds");
  }, 2000);

  console.log("Step 3");

  // Counter using setInterval
  let counterValue = 1;

  const timer = setInterval(() => {
    console.log("Counter:", counterValue);
    counterValue++;

    if (counterValue > 5) {
      clearInterval(timer);
    }
  }, 1000);
</script>

</body>
</html
